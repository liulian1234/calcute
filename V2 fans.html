<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>跳飞机云端策略分析</title>

<style>
body {
  margin: 0;
  padding: 12px;
  background: #07111f;
  color: white;
  font-family: Arial, sans-serif;
}

.card {
  background: #111827;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #22c55e;
  font-weight: bold;
  font-size: 16px;
}

.stat {
  background: #1f2937;
  padding: 10px;
  border-radius: 12px;
  margin: 8px 0;
}

.big {
  font-size: 24px;
  font-weight: bold;
}

.green { color: #4ade80; }
.red { color: #f87171; }
.gold { color: #facc15; }
.purple { color: #c084fc; }
.blue { color: #60a5fa; }
.gray { color: #9ca3af; }

.safe {
  border: 1px solid #22c55e;
  background: #052e16;
}

.warning {
  border: 1px solid #facc15;
  background: #451a03;
}

.danger {
  border: 1px solid #ef4444;
  background: #450a0a;
}

.row {
  background: #0f172a;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
}
</style>
</head>

<body>

<h1>跳飞机云端策略分析</h1>

<div class="card">
  <button onclick="loadData()">刷新分析</button>
</div>

<div class="card">
  <h2>当前答案</h2>
  <div id="answerBox" class="stat big gold">等待数据</div>
</div>

<div class="card">
  <h2>策略状态</h2>
  <div class="stat">总局数：<span id="totalRounds">0</span></div>
  <div class="stat">距离上一次 Full TP：<span id="sinceFull">0</span> 局</div>
  <div class="stat">连续蓝色：<span id="blueStreak">0</span></div>
  <div class="stat">连续紫色：<span id="purpleStreak">0</span></div>
  <div class="stat">Full TP 次数：<span id="fullCount">0</span></div>
  <div class="stat">Half TP 次数：<span id="halfCount">0</span></div>
  <div class="stat">Full TP 概率：<span id="fullRate">0%</span></div>
  <div class="stat">Half TP 概率：<span id="halfRate">0%</span></div>
</div>

<div class="card">
  <h2>AI 分析</h2>
  <div id="analysisBox" class="stat">暂无分析</div>
</div>

<div class="card">
  <h2>最近 20 局</h2>
  <div id="historyBox"></div>
</div>

<script>
const API_URL = "换成你的 Apps Script URL";

let rows = [];

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const result = await res.json();

    if (!result.success) {
      alert("读取失败");
      return;
    }

    rows = result.data.map(r => ({
      time: r.time,
      multiplier: Number(r.multiplier)
    })).filter(r => r.multiplier > 0);

    analyze();

  } catch (err) {
    alert("读取错误：" + err.message);
  }
}

function getColor(multiplier) {
  if (multiplier >= 10) return "full";
  if (multiplier >= 2) return "purple";
  return "blue";
}

function analyze() {
  let total = rows.length;

  let fullCount = 0;
  let halfCount = 0;

  let sinceFull = 999;
  let blueStreak = 0;
  let purpleStreak = 0;

  for (let i = 0; i < rows.length; i++) {
    const m = rows[i].multiplier;
    const color = getColor(m);

    if (m >= 10) {
      fullCount++;
      sinceFull = 0;
      blueStreak = 0;
      purpleStreak = 0;
    } else {
      sinceFull++;

      if (m >= 5) {
        halfCount++;
      }

      if (color === "blue") {
        blueStreak++;
        purpleStreak = 0;
      } else if (color === "purple") {
        purpleStreak++;
        blueStreak = 0;
      }
    }
  }

  const fullRate = total > 0 ? (fullCount / total * 100).toFixed(2) : "0.00";
  const halfRate = total > 0 ? (halfCount / total * 100).toFixed(2) : "0.00";

  const answer = getAnswer(sinceFull, blueStreak, purpleStreak);
  const analysis = getAnalysis(total, fullRate, halfRate, sinceFull, blueStreak, purpleStreak);

  document.getElementById("totalRounds").innerText = total;
  document.getElementById("sinceFull").innerText = sinceFull >= 999 ? "还没出现" : sinceFull;
  document.getElementById("blueStreak").innerText = blueStreak;
  document.getElementById("purpleStreak").innerText = purpleStreak;
  document.getElementById("fullCount").innerText = fullCount;
  document.getElementById("halfCount").innerText = halfCount;
  document.getElementById("fullRate").innerText = fullRate + "%";
  document.getElementById("halfRate").innerText = halfRate + "%";

  const answerBox = document.getElementById("answerBox");
  answerBox.innerText = answer.text;
  answerBox.className = "stat big " + answer.className;

  const analysisBox = document.getElementById("analysisBox");
  analysisBox.innerText = analysis.text;
  analysisBox.className = "stat " + analysis.className;

  renderHistory();
}

function getAnswer(sinceFull, blueStreak, purpleStreak) {
  if (sinceFull === 999) {
    return {
      text: "还没有 Full TP 数据，先观察，不下",
      className: "warning"
    };
  }

  if (sinceFull < 7) {
    return {
      text: `Full TP 后等待中，还差 ${7 - sinceFull} 局`,
      className: "warning"
    };
  }

  if (purpleStreak >= 2) {
    return {
      text: "连续 2 个紫色，先等 1 局，不马上下",
      className: "warning"
    };
  }

  if (blueStreak >= 10) {
    if (sinceFull >= 18 && sinceFull <= 20) {
      return {
        text: "进入 18-20 局区间，可以小注尝试第 1 单",
        className: "safe"
      };
    }

    return {
      text: "连续蓝色过长，不追，等到 18-20 局",
      className: "danger"
    };
  }

  if (sinceFull >= 7) {
    return {
      text: "已过 7 局，可以准备第 1 单，但只允许最多 2 单",
      className: "safe"
    };
  }

  return {
    text: "等待",
    className: "warning"
  };
}

function getAnalysis(total, fullRate, halfRate, sinceFull, blueStreak, purpleStreak) {
  if (total < 30) {
    return {
      text: "数据少于 30 局，参考价值还不高。建议继续记录，不要急着实盘。",
      className: "warning"
    };
  }

  if (Number(fullRate) >= 10) {
    return {
      text: "目前 Full TP 出现率偏高，但这不代表下一局一定会中。可以继续按规则小注，不要加倍追。",
      className: "safe"
    };
  }

  if (Number(fullRate) < 8 && sinceFull > 20) {
    return {
      text: "Full TP 出现率偏低，而且已经很久没出现，当前不适合激进下注。",
      className: "danger"
    };
  }

  if (blueStreak >= 10) {
    return {
      text: "蓝色连续过长，容易让人想追单。系统建议只等 18-20 局窗口，不要提前乱下。",
      className: "warning"
    };
  }

  if (purpleStreak >= 2) {
    return {
      text: "连续紫色后先冷却一局，避免情绪进场。",
      className: "warning"
    };
  }

  return {
    text: "当前数据中性，严格执行：Full TP 后等 7 局，最多连续 2 单。",
    className: "warning"
  };
}

function renderHistory() {
  const box = document.getElementById("historyBox");
  box.innerHTML = "";

  const recent = rows.slice(-20).reverse();

  if (recent.length === 0) {
    box.innerHTML = "<div class='gray'>暂无记录</div>";
    return;
  }

  recent.forEach((r, index) => {
    const color = getColor(r.multiplier);

    let colorClass = "blue";
    let label = "蓝色";

    if (color === "purple") {
      colorClass = "purple";
      label = "紫色";
    }

    if (color === "full") {
      colorClass = "gold";
      label = "Full TP";
    }

    const div = document.createElement("div");
    div.className = "row";
    div.innerHTML = `
      <div>#${rows.length - index}</div>
      <div>倍率：<span class="${colorClass}">${r.multiplier}x</span></div>
      <div>类型：${label}</div>
    `;

    box.appendChild(div);
  });
}

loadData();
setInterval(loadData, 5000);
</script>

</body>
</html>
