<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crash 风险分析系统</title>
<style>
body {
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:white;
  margin:0;
  padding:16px;
}
.card {
  background:#111827;
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
}
textarea {
  width:100%;
  height:160px;
  border-radius:12px;
  padding:10px;
  font-size:15px;
}
button {
  background:#22c55e;
  color:#000;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}
.good { color:#22c55e; }
.warn { color:#facc15; }
.danger { color:#ef4444; }
.big { font-size:22px; font-weight:bold; }
</style>
</head>

<body>

<h2>📊 Crash 风险分析系统</h2>

<div class="card">
  <p>把 Google Sheet 里的倍率复制进来，例如：</p>
  <p>1.03, 2.15, 6.06, 1.00, 10.61</p>
  <textarea id="inputData" placeholder="输入倍率数据，用逗号或换行分开"></textarea>
  <button onclick="analyze()">开始分析</button>
</div>

<div class="card">
  <h3>📈 统计结果</h3>
  <div id="result">等待输入数据...</div>
</div>

<div class="card">
  <h3>⚠️ 风险管理建议</h3>
  <div id="risk">等待分析...</div>
</div>

<script>
function analyze() {
  const raw = document.getElementById("inputData").value;

  const data = raw
    .split(/[\s,，]+/)
    .map(Number)
    .filter(v => !isNaN(v) && v >= 1);

  if (data.length === 0) {
    document.getElementById("result").innerHTML = "没有有效数据";
    return;
  }

  const total = data.length;

  const hit5 = data.filter(v => v >= 5).length;
  const hit10 = data.filter(v => v >= 10).length;

  const prob5 = hit5 / total;
  const prob10 = hit10 / total;

  const avgWait5 = prob5 > 0 ? (1 / prob5).toFixed(2) : "暂无";
  const avgWait10 = prob10 > 0 ? (1 / prob10).toFixed(2) : "暂无";

  let miss5 = 0;
  let miss10 = 0;

  for (let i = data.length - 1; i >= 0; i--) {
    if (data[i] < 5) miss5++;
    else break;
  }

  for (let i = data.length - 1; i >= 0; i--) {
    if (data[i] < 10) miss10++;
    else break;
  }

  const last = data[data.length - 1];

  document.getElementById("result").innerHTML = `
    总局数：<span class="big">${total}</span><br><br>

    ≥5x 次数：${hit5} 次<br>
    ≥5x 概率：${(prob5 * 100).toFixed(2)}%<br>
    平均约每 <span class="good">${avgWait5}</span> 局出现一次 ≥5x<br><br>

    ≥10x 次数：${hit10} 次<br>
    ≥10x 概率：${(prob10 * 100).toFixed(2)}%<br>
    平均约每 <span class="warn">${avgWait10}</span> 局出现一次 ≥10x<br><br>

    当前最后倍率：${last}x<br>
    连续未出 ≥5x：${miss5} 局<br>
    连续未出 ≥10x：${miss10} 局
  `;

  let riskText = "";

  if (miss10 >= 20) {
    riskText += `<p class="danger">⚠️ 已连续 ${miss10} 局未出 ≥10x。不要冲动加注，容易追高。</p>`;
  } else if (miss10 >= 10) {
    riskText += `<p class="warn">🟡 已连续 ${miss10} 局未出 ≥10x，可以观察，但不要重仓。</p>`;
  } else {
    riskText += `<p class="good">🟢 ≥10x 间隔还在正常范围。</p>`;
  }

  if (miss5 >= 10) {
    riskText += `<p class="danger">⚠️ 已连续 ${miss5} 局未出 ≥5x，波动偏低，建议小注或暂停。</p>`;
  } else if (miss5 >= 5) {
    riskText += `<p class="warn">🟡 ≥5x 已经 ${miss5} 局没出，可观察下一轮，但不要倍投。</p>`;
  } else {
    riskText += `<p class="good">🟢 ≥5x 出现节奏正常。</p>`;
  }

  riskText += `
    <hr>
    <b>资金规则：</b><br>
    1. 单局下注不要超过本金 1% - 2%。<br>
    2. 连续输 5 局，暂停 10 分钟。<br>
    3. 达到目标盈利，直接停止。<br>
    4. 不要因为“很久没出”就加大下注。
  `;

  document.getElementById("risk").innerHTML = riskText;
}
</script>

</body>
</html>
