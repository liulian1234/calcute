<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crash Tracker V7</title>

<style>
body { background:#0b1220; color:white; font-family:Arial; padding:12px; }
.card { background:#111827; padding:14px; border-radius:14px; margin-bottom:12px; }
input, select {
  width:100%; padding:10px; margin:6px 0;
  border-radius:10px; border:none; background:#1f2937; color:white;
}
button { padding:12px; border:none; border-radius:10px; width:48%; margin:5px; font-weight:bold;}
.win{background:#22c55e;} .lose{background:#ef4444;}
.start{background:#3b82f6; width:100%;}
.stat{background:#1f2937; padding:8px; margin:6px 0; border-radius:8px;}
.safe{color:#22c55e;} .warn{color:#facc15;} .danger{color:#ef4444;}
</style>
</head>

<body>

<div class="card">
<h2>🚀 启动配置</h2>

<label>当前本金</label>
<input id="startBalance" type="number">

<label>目标金额</label>
<input id="targetBalance" type="number">

<label>模式</label>
<select id="mode">
  <option value="A">A 保守</option>
  <option value="B">B 进攻</option>
  <option value="C">C 高风险</option>
  <option value="D">D 自动模式（推荐）</option>
</select>

<button class="start" onclick="startSystem()">开始</button>
</div>

<div class="card">
<div class="stat">当前：$<span id="balance">0</span></div>
<div class="stat">目标：$<span id="target">0</span></div>
<div class="stat">利润：$<span id="profit">0</span></div>
<div class="stat">状态：<span id="status" class="warn">未启动</span></div>
</div>

<div class="card">
<button class="win" onclick="addWin()">WIN</button>
<button class="lose" onclick="addLose()">LOSE</button>
<div class="stat">当前下注：$<span id="bet">0</span></div>
<div class="stat">当前风险：<span id="riskShow">0%</span></div>
</div>

<div class="card">
<div class="stat">局数：<span id="total">0</span></div>
<div class="stat">胜率：<span id="rate">0%</span></div>
<div class="stat">连赢：<span id="winStreak">0</span></div>
<div class="stat">连输：<span id="loseStreak">0</span></div>
</div>

<div class="card">
<h3>⏱️ 游玩时间</h3>
<div class="stat">开始时间：<span id="startTime">-</span></div>
<div class="stat">已玩时长：<span id="duration">00:00:00</span></div>
</div>

<div class="card">
<button class="start" onclick="saveData()">💾 保存数据</button>
</div>

<script>

// ===== 核心 =====
let balance=0, target=0, profit=0;
let total=0, win=0, lose=0;
let loseStreak=0, winStreak=0;

let started=false, stopped=false;
let mode="B";

let risk=0.03;
let maxLose=5;

// ===== 时间 =====
let startTimestamp = 0;
let timerInterval = null;

// ===== 启动 =====
function startSystem(){

  balance = parseFloat(startBalance.value);
  target = parseFloat(targetBalance.value);
  mode = document.getElementById("mode").value;

  if(!balance || !target){
    alert("输入完整");
    return;
  }

  if(mode=="A"){ risk=0.02; maxLose=3; }
  if(mode=="B"){ risk=0.03; maxLose=5; }
  if(mode=="C"){ risk=0.05; maxLose=7; }

  started=true;
  stopped=false;

  profit=0;
  total=0; win=0; lose=0;
  loseStreak=0; winStreak=0;

  // 时间
  startTimestamp = Date.now();
  document.getElementById("startTime").innerText =
    new Date(startTimestamp).toLocaleTimeString();

  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 1000);

  update();
}

// ===== 自动模式 =====
function updateAutoRisk(){

  if(mode !== "D") return;

  if(loseStreak >= 4){
    risk = 0.01;
  }
  else if(loseStreak >= 2){
    risk = 0.02;
  }
  else if(winStreak >= 3){
    risk = 0.04;
  }
  else{
    risk = 0.03;
  }

  maxLose = 6;
}

// ===== 下注 =====
function calcBet(){
  updateAutoRisk();
  return balance * risk;
}

// ===== WIN =====
function addWin(){
  if(!started || stopped) return;

  let b = calcBet();
  let gain = b * 2;

  balance += gain;
  profit += gain;

  win++; total++;
  winStreak++;
  loseStreak=0;

  check();
  update();
}

// ===== LOSE =====
function addLose(){
  if(!started || stopped) return;

  let b = calcBet();

  balance -= b;
  profit -= b;

  lose++; total++;
  loseStreak++;
  winStreak=0;

  check();
  update();
}

// ===== 风控 =====
function check(){

  if(balance >= target){
    stopped=true;
    status.innerText="🎯 达标";
    status.className="safe";
  }

  if(loseStreak >= maxLose){
    stopped=true;
    status.innerText="⚠️ 连输停止";
    status.className="danger";
  }

  if(balance <= 0){
    stopped=true;
    status.innerText="💀 爆仓";
    status.className="danger";
  }
}

// ===== 时间更新 =====
function updateTimer(){

  let now = Date.now();
  let diff = Math.floor((now - startTimestamp) / 1000);

  let h = String(Math.floor(diff / 3600)).padStart(2,'0');
  let m = String(Math.floor((diff % 3600)/60)).padStart(2,'0');
  let s = String(diff % 60).padStart(2,'0');

  document.getElementById("duration").innerText = `${h}:${m}:${s}`;
}

// ===== 保存 =====
function saveData(){

  if(!started){
    alert("还没开始");
    return;
  }

  let data = {
    startBalance: parseFloat(startBalance.value),
    target: target,
    mode: mode,
    currentBalance: balance,
    profit: profit,
    total: total,
    win: win,
    lose: lose,
    winStreak: winStreak,
    loseStreak: loseStreak,
    duration: document.getElementById("duration").innerText,
    time: new Date().toLocaleString()
  };

  let blob = new Blob([JSON.stringify(data, null, 2)], {
    type: "application/json"
  });

  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "crash_session.json";
  a.click();

  URL.revokeObjectURL(url);
}

// ===== UI =====
function update(){

  document.getElementById("balance").innerText = balance.toFixed(2);
  document.getElementById("target").innerText = target.toFixed(2);
  document.getElementById("profit").innerText = profit.toFixed(2);

  document.getElementById("total").innerText = total;
  let rate = total ? (win/total*100):0;
  document.getElementById("rate").innerText = rate.toFixed(1)+"%";

  document.getElementById("loseStreak").innerText = loseStreak;
  document.getElementById("winStreak").innerText = winStreak;

  document.getElementById("bet").innerText = calcBet().toFixed(2);
  document.getElementById("riskShow").innerText = (risk*100).toFixed(1)+"%";
}

</script>

</body>
</html>
