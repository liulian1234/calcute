<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crash Tracker V5</title>

<style>
body { background:#0b1220; color:white; font-family:Arial; padding:12px; }
.card { background:#111827; padding:14px; border-radius:14px; margin-bottom:12px; }
input, select {
  width:100%; padding:10px; margin:6px 0;
  border-radius:10px; border:none; background:#1f2937; color:white;
}
button { padding:12px; border:none; border-radius:10px; width:48%; margin:5px; font-weight:bold;}
.win{background:#22c55e;} .lose{background:#ef4444;}
.start{background:#3b82f6; width:100%;}
.stat{background:#1f2937; padding:8px; margin:6px 0; border-radius:8px;}
.safe{color:#22c55e;} .warn{color:#facc15;} .danger{color:#ef4444;}
</style>
</head>

<body>

<div class="card">
<h2>🚀 启动配置</h2>

<label>当前本金</label>
<input id="startBalance" type="number">

<label>目标金额</label>
<input id="targetBalance" type="number">

<label>模式选择</label>
<select id="mode">
  <option value="A">A 保守稳定</option>
  <option value="B">B 进攻</option>
  <option value="C">C 高风险</option>
</select>

<button class="start" onclick="startSystem()">开始</button>
</div>

<div class="card">
<h3>💰 资金</h3>
<div class="stat">当前：$<span id="balance">0</span></div>
<div class="stat">目标：$<span id="target">0</span></div>
<div class="stat">利润：$<span id="profit">0</span></div>
<div class="stat">状态：<span id="status" class="warn">未启动</span></div>
</div>

<div class="card">
<button class="win" onclick="addWin()">WIN</button>
<button class="lose" onclick="addLose()">LOSE</button>
<div class="stat">建议下注：$<span id="bet">0</span></div>
</div>

<div class="card">
<h3>📊 数据</h3>
<div class="stat">局数：<span id="total">0</span></div>
<div class="stat">胜率：<span id="rate">0%</span></div>
<div class="stat">连输：<span id="loseStreak">0</span></div>
</div>

<script>

let balance=0, target=0, profit=0;
let total=0, win=0, lose=0;
let loseStreak=0;
let started=false, stopped=false;

let risk=0.03;
let maxLose=5;

// ===== 启动 =====
function startSystem(){

  balance = parseFloat(startBalance.value);
  target = parseFloat(targetBalance.value);
  let mode = document.getElementById("mode").value;

  if(!balance || !target){
    alert("输入完整");
    return;
  }

  // 模式设定
  if(mode=="A"){ risk=0.02; maxLose=3; }
  if(mode=="B"){ risk=0.03; maxLose=5; }
  if(mode=="C"){ risk=0.05; maxLose=7; }

  started=true;
  stopped=false;

  profit=0;
  total=0; win=0; lose=0; loseStreak=0;

  update();
}

// ===== 下注 =====
function calcBet(){
  return balance * risk;
}

// ===== WIN =====
function addWin(){
  if(!started || stopped) return;

  let b = calcBet();
  let gain = b * 2; // 3x profit

  balance += gain;
  profit += gain;

  win++; total++;
  loseStreak=0;

  check();
  update();
}

// ===== LOSE =====
function addLose(){
  if(!started || stopped) return;

  let b = calcBet();

  balance -= b;
  profit -= b;

  lose++; total++;
  loseStreak++;

  check();
  update();
}

// ===== 风控 =====
function check(){

  if(balance >= target){
    stopped=true;
    status.innerText="🎯 达标";
    status.className="safe";
  }

  if(loseStreak >= maxLose){
    stopped=true;
    status.innerText="⚠️ 连输停止";
    status.className="danger";
  }

  if(balance <= 0){
    stopped=true;
    status.innerText="💀 爆仓";
    status.className="danger";
  }
}

// ===== UI =====
function update(){

  document.getElementById("balance").innerText = balance.toFixed(2);
  document.getElementById("target").innerText = target.toFixed(2);
  document.getElementById("profit").innerText = profit.toFixed(2);

  document.getElementById("total").innerText = total;
  let rate = total ? (win/total*100):0;
  document.getElementById("rate").innerText = rate.toFixed(1)+"%";

  document.getElementById("loseStreak").innerText = loseStreak;
  document.getElementById("bet").innerText = calcBet().toFixed(2);
}

</script>

</body>
</html>
