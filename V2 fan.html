<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>跳飞机策略记录分析器 V1</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 12px;
  background: #07111f;
  color: #ffffff;
  font-family: Arial, sans-serif;
}

h1, h2, h3 {
  margin: 8px 0;
}

.card {
  background: #111827;
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;
  box-shadow: 0 0 12px rgba(0,0,0,0.25);
}

input, button, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  margin-bottom: 8px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
}

input {
  background: #1f2937;
  color: white;
}

button {
  font-weight: bold;
  cursor: pointer;
}

.btn-main {
  background: #22c55e;
  color: #03120a;
}

.btn-danger {
  background: #ef4444;
  color: white;
}

.btn-blue {
  background: #3b82f6;
  color: white;
}

.btn-yellow {
  background: #facc15;
  color: #111827;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.stat {
  background: #1f2937;
  padding: 10px;
  border-radius: 12px;
  margin: 6px 0;
}

.big {
  font-size: 22px;
  font-weight: bold;
}

.blue {
  color: #60a5fa;
}

.purple {
  color: #c084fc;
}

.gold {
  color: #facc15;
}

.red {
  color: #f87171;
}

.green {
  color: #4ade80;
}

.gray {
  color: #9ca3af;
}

.log {
  max-height: 340px;
  overflow-y: auto;
}

.row {
  background: #0f172a;
  border-radius: 10px;
  padding: 10px;
  margin-bottom: 8px;
  font-size: 14px;
}

.badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
}

.badge-blue {
  background: #1d4ed8;
}

.badge-purple {
  background: #7e22ce;
}

.badge-gold {
  background: #ca8a04;
  color: #111827;
}

.warning {
  background: #451a03;
  border: 1px solid #facc15;
}

.safe {
  background: #052e16;
  border: 1px solid #22c55e;
}

.danger {
  background: #450a0a;
  border: 1px solid #ef4444;
}
</style>
</head>

<body>
  
  <a href="index.html">
  <button>📊 返回</button>
</a>
  
<h1>跳飞机策略记录分析器 V1</h1>

<div class="card">
  <h2>基础设置</h2>

  <label>当前本金</label>
  <input id="bankrollInput" type="number" step="0.01" placeholder="例如：30">

  <label>每次下注金额</label>
  <input id="betInput" type="number" step="0.01" value="0.5">

  <button class="btn-blue" onclick="saveSettings()">保存设置</button>
</div>

<div class="card">
  <h2>输入本局倍率</h2>

  <input id="multiplierInput" type="number" step="0.01" placeholder="例如：1.23 / 5 / 10">

  <button class="btn-main" onclick="addRound()">记录这一局</button>

  <div class="stat">
    <div>当前建议：</div>
    <div id="currentAdvice" class="big gold">等待数据中</div>
  </div>
</div>

<div class="card">
  <h2>策略状态</h2>

  <div class="stat">距离上一次 Full TP：<span id="sinceFull">0</span> 局</div>
  <div class="stat">等待状态：<span id="waitStatus">未开始</span></div>
  <div class="stat">当前连续下注次数：<span id="betStreak">0</span> / 2</div>
  <div class="stat">连续蓝色：<span id="blueStreak">0</span></div>
  <div class="stat">连续紫色：<span id="purpleStreak">0</span></div>
</div>

<div class="card">
  <h2>资金统计</h2>

  <div class="grid">
    <div class="stat">
      本金
      <div id="bankrollShow" class="big">0.00</div>
    </div>

    <div class="stat">
      当前盈亏
      <div id="profitShow" class="big">0.00</div>
    </div>

    <div class="stat">
      总下注次数
      <div id="totalBets" class="big">0</div>
    </div>

    <div class="stat">
      胜率
      <div id="winRate" class="big">0%</div>
    </div>

    <div class="stat">
      Full TP 命中
      <div id="fullHits" class="big gold">0</div>
    </div>

    <div class="stat">
      Half TP 命中
      <div id="halfHits" class="big purple">0</div>
    </div>
  </div>
</div>

<div class="card">
  <h2>AI 分析</h2>
  <div id="analysisBox" class="stat">
    暂无分析，请先输入数据。
  </div>
</div>

<div class="card">
  <h2>操作</h2>

  <button class="btn-yellow" onclick="exportCSV()">导出记录 CSV</button>
  <button class="btn-danger" onclick="resetAll()">清空所有记录</button>
</div>

<div class="card">
  <h2>记录</h2>
  <div id="historyBox" class="log"></div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("crash_strategy_data_v1")) || {
  bankroll: 30,
  betAmount: 0.5,
  profit: 0,

  rounds: [],
  totalBets: 0,
  wins: 0,
  losses: 0,
  fullHits: 0,
  halfHits: 0,

  sinceFull: 999,
  waitAfterFull: false,
  waitCount: 0,

  betStreak: 0,
  canBet: false,

  blueStreak: 0,
  purpleStreak: 0
};

function saveData() {
  localStorage.setItem("crash_strategy_data_v1", JSON.stringify(data));
}

function saveSettings() {
  const bankroll = parseFloat(document.getElementById("bankrollInput").value);
  const betAmount = parseFloat(document.getElementById("betInput").value);

  if (!isNaN(bankroll)) data.bankroll = bankroll;
  if (!isNaN(betAmount)) data.betAmount = betAmount;

  saveData();
  updateUI();
  alert("设置已保存");
}

function getColor(multiplier) {
  if (multiplier >= 10) return "gold";
  if (multiplier >= 2) return "purple";
  return "blue";
}

function colorName(color) {
  if (color === "gold") return "Full TP";
  if (color === "purple") return "紫色";
  return "蓝色";
}

function addRound() {
  const input = document.getElementById("multiplierInput");
  const multiplier = parseFloat(input.value);

  if (isNaN(multiplier) || multiplier <= 0) {
    alert("请输入正确倍率");
    return;
  }

  const color = getColor(multiplier);

  let action = "等待";
  let result = "无下注";
  let profitChange = 0;
  let shouldBetThisRound = data.canBet;

  if (shouldBetThisRound) {
    action = "已下单";
    data.totalBets++;
    data.betStreak++;

    if (multiplier >= 10) {
      result = "Full TP 命中";
      profitChange = data.betAmount * (10 - 1);
      data.wins++;
      data.fullHits++;
      data.profit += profitChange;

      resetAfterFull();

    } else if (multiplier >= 5) {
      result = "Half TP 命中";
      profitChange = data.betAmount * (5 - 1);
      data.wins++;
      data.halfHits++;
      data.profit += profitChange;

      if (data.betStreak >= 2) {
        data.canBet = false;
        data.betStreak = 0;
      } else {
        data.canBet = true;
      }

    } else {
      result = "亏损";
      profitChange = -data.betAmount;
      data.losses++;
      data.profit += profitChange;

      if (data.betStreak >= 2) {
        data.canBet = false;
        data.betStreak = 0;
      } else {
        data.canBet = true;
      }
    }

  } else {
    action = "观察";

    if (multiplier >= 10) {
      resetAfterFull();
    } else {
      updateWaitingState();
    }
  }

  updateStreaks(color);

  data.rounds.unshift({
    time: new Date().toLocaleString(),
    multiplier,
    color,
    action,
    result,
    profitChange: profitChange.toFixed(2),
    bankrollAfter: (data.bankroll + data.profit).toFixed(2),
    sinceFull: data.sinceFull,
    betStreak: data.betStreak
  });

  if (data.rounds.length > 500) {
    data.rounds.pop();
  }

  input.value = "";
  saveData();
  updateUI();
}

function resetAfterFull() {
  data.sinceFull = 0;
  data.waitAfterFull = true;
  data.waitCount = 0;
  data.canBet = false;
  data.betStreak = 0;
}

function updateWaitingState() {
  if (data.waitAfterFull) {
    data.waitCount++;
    data.sinceFull++;

    if (data.waitCount >= 7) {
      data.waitAfterFull = false;
      data.canBet = true;
      data.betStreak = 0;
    }

  } else {
    data.sinceFull++;

    if (data.sinceFull >= 7 && data.betStreak === 0) {
      data.canBet = true;
    }

    if (data.blueStreak >= 10 && data.sinceFull >= 18 && data.sinceFull <= 20) {
      data.canBet = true;
    }

    if (data.purpleStreak >= 2) {
      data.canBet = false;
    }
  }
}

function updateStreaks(color) {
  if (color === "blue") {
    data.blueStreak++;
    data.purpleStreak = 0;
  } else if (color === "purple") {
    data.purpleStreak++;
    data.blueStreak = 0;
  } else {
    data.blueStreak = 0;
    data.purpleStreak = 0;
  }

  if (data.purpleStreak >= 2) {
    data.canBet = false;
  }
}

function getAdvice() {
  if (data.waitAfterFull) {
    return `Full TP 后等待中，还需要等待 ${Math.max(0, 7 - data.waitCount)} 局`;
  }

  if (data.canBet && data.betStreak === 0) {
    return "可以下第 1 单，单注保持 0.5";
  }

  if (data.canBet && data.betStreak === 1) {
    return "上一单没有 Full TP，可以下第 2 单；这是最后一单";
  }

  if (data.betStreak >= 2) {
    return "已经连续 2 单，停止下单，继续等待";
  }

  if (data.blueStreak >= 10) {
    if (data.sinceFull >= 18 && data.sinceFull <= 20) {
      return "连续蓝色过长，并且进入 18-20 局区间，可以小心尝试";
    }
    return "连续蓝色过长，不追，等到 18-20 局区间";
  }

  if (data.purpleStreak >= 2) {
    return "连续 2 个紫色，先等 1 局，不马上下";
  }

  if (data.sinceFull < 7) {
    return `还没到第 7 局，继续等待，还差 ${7 - data.sinceFull} 局`;
  }

  return "等待更好的信号，不要乱追";
}

function getAnalysis() {
  const totalRounds = data.rounds.length;
  const totalBets = data.totalBets;
  const winRate = totalBets > 0 ? (data.wins / totalBets) * 100 : 0;
  const fullRate = totalBets > 0 ? (data.fullHits / totalBets) * 100 : 0;
  const currentBankroll = data.bankroll + data.profit;

  let boxClass = "stat";
  let text = "";

  if (totalRounds < 10) {
    text = "数据还太少，至少记录 30 局以上才比较有参考价值。现在不要加注。";
    boxClass += " warning";
  } else if (data.profit > 0 && fullRate >= 20) {
    text = "目前策略表现不错，Full TP 命中率达到关键区间。但仍然建议保持 0.5 单注，不要因为盈利而加大。";
    boxClass += " safe";
  } else if (data.profit < 0 && fullRate < 20) {
    text = "目前 Full TP 命中率偏低，策略暂时不是正数值。建议停止实盘，只继续记录观察。";
    boxClass += " danger";
  } else {
    text = "目前数据中性。可以继续记录，但不要连续追单，严格保持最多 2 单规则。";
    boxClass += " warning";
  }

  if (currentBankroll < 25) {
    text += " 当前本金已经低于 25，风险变高，建议降低下注或暂停。";
  }

  if (data.losses >= data.wins + 3) {
    text += " 输单明显偏多，今天最好停止。";
  }

  return { text, boxClass };
}

function updateUI() {
  document.getElementById("bankrollInput").value = data.bankroll;
  document.getElementById("betInput").value = data.betAmount;

  document.getElementById("bankrollShow").innerText = (data.bankroll + data.profit).toFixed(2);
  document.getElementById("profitShow").innerText = data.profit.toFixed(2);

  document.getElementById("profitShow").className =
    data.profit >= 0 ? "big green" : "big red";

  document.getElementById("sinceFull").innerText = data.sinceFull >= 999 ? "还没有记录 Full TP" : data.sinceFull;
  document.getElementById("betStreak").innerText = data.betStreak;
  document.getElementById("blueStreak").innerText = data.blueStreak;
  document.getElementById("purpleStreak").innerText = data.purpleStreak;

  document.getElementById("totalBets").innerText = data.totalBets;

  const winRate = data.totalBets > 0 ? ((data.wins / data.totalBets) * 100).toFixed(2) : "0.00";
  document.getElementById("winRate").innerText = winRate + "%";

  document.getElementById("fullHits").innerText = data.fullHits;
  document.getElementById("halfHits").innerText = data.halfHits;

  document.getElementById("currentAdvice").innerText = getAdvice();

  if (data.waitAfterFull) {
    document.getElementById("waitStatus").innerText = `Full TP 后等待中：${data.waitCount}/7`;
  } else if (data.canBet) {
    document.getElementById("waitStatus").innerText = "允许下单";
  } else {
    document.getElementById("waitStatus").innerText = "等待中";
  }

  const analysis = getAnalysis();
  const analysisBox = document.getElementById("analysisBox");
  analysisBox.className = analysis.boxClass;
  analysisBox.innerText = analysis.text;

  renderHistory();
}

function renderHistory() {
  const box = document.getElementById("historyBox");
  box.innerHTML = "";

  if (data.rounds.length === 0) {
    box.innerHTML = "<div class='gray'>暂无记录</div>";
    return;
  }

  data.rounds.forEach((r, index) => {
    let badgeClass = "badge-blue";
    if (r.color === "purple") badgeClass = "badge-purple";
    if (r.color === "gold") badgeClass = "badge-gold";

    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
      <div><b>#${data.rounds.length - index}</b> ${r.time}</div>
      <div>倍率：<span class="${r.color}">${r.multiplier}x</span>
      <span class="badge ${badgeClass}">${colorName(r.color)}</span></div>
      <div>动作：${r.action}</div>
      <div>结果：${r.result}</div>
      <div>本局盈亏：${r.profitChange}</div>
      <div>局后本金：${r.bankrollAfter}</div>
    `;

    box.appendChild(div);
  });
}

function exportCSV() {
  if (data.rounds.length === 0) {
    alert("没有数据可以导出");
    return;
  }

  let csv = "时间,倍率,颜色,动作,结果,本局盈亏,局后本金,距离FullTP局数,连续下注次数\n";

  data.rounds.slice().reverse().forEach(r => {
    csv += `${r.time},${r.multiplier},${colorName(r.color)},${r.action},${r.result},${r.profitChange},${r.bankrollAfter},${r.sinceFull},${r.betStreak}\n`;
  });

  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "crash_strategy_record.csv";
  a.click();

  URL.revokeObjectURL(url);
}

function resetAll() {
  if (!confirm("确定要清空所有记录吗？")) return;

  localStorage.removeItem("crash_strategy_data_v1");

  data = {
    bankroll: 30,
    betAmount: 0.5,
    profit: 0,

    rounds: [],
    totalBets: 0,
    wins: 0,
    losses: 0,
    fullHits: 0,
    halfHits: 0,

    sinceFull: 999,
    waitAfterFull: false,
    waitCount: 0,

    betStreak: 0,
    canBet: false,

    blueStreak: 0,
    purpleStreak: 0
  };

  saveData();
  updateUI();
}

updateUI();
</script>

</body>
</html>
